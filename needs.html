<!DOCTYPE html>
<html>
<head>
  <title>Care Needs</title>
  <style>
    body { margin:0; font-family:Arial; background:#f8fafc; }
    .app { max-width:520px; min-height:100vh; margin:auto; background:white; padding:24px; }
    .topbar { font-size:24px; font-weight:800; margin-bottom:24px; color:#e0001b; }
    .card { background:white; border-radius:22px; padding:24px; box-shadow:0 4px 14px #ddd; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .option { border:1px solid #ddd; border-radius:16px; padding:16px; text-align:center; font-weight:bold; cursor:pointer; }
    .selected { border-color:#e0001b; background:#fff1f2; color:#be123c; }
    select { width:100%; padding:15px; border-radius:14px; margin-top:10px; }
    button { width:100%; border:none; background:#c70019; color:white; padding:18px; border-radius:16px; font-size:18px; font-weight:800; margin-top:20px; cursor:pointer; }
    p { color:#64748b; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">♥ CareSync</div>

    <div class="card">
      <h2>Care Needs</h2>
      <p>Select the elder’s care needs.</p>

      <div class="grid">
        <div class="option selected" onclick="toggle(this)">♿ Wheelchair</div>
        <div class="option selected" onclick="toggle(this)">💊 Medication</div>
        <div class="option" onclick="toggle(this)">🏥 Clinic Escort</div>
        <div class="option" onclick="toggle(this)">🍱 Meal Support</div>
        <div class="option" onclick="toggle(this)">🤝 Companionship</div>
        <div class="option" onclick="toggle(this)">🌐 Translation</div>
      </div>

      <br>

      <label><b>Mobility Level</b></label>
      <select>
        <option>Wheelchair user</option>
        <option>Walking stick</option>
        <option>Walker frame</option>
        <option>Bedbound</option>
      </select>

      <br>

      <label><b>Do you need medical transportation?</b></label>
      <select>
        <option>Yes</option>
        <option>No</option>
      </select>

      <button onclick="window.location.href='booking.html'">Save Needs & Continue</button>
    </div>
  </div>

  <script>
    function toggle(el) {
      el.classList.toggle("selected");
    }
  </script>
</body>
</html>
