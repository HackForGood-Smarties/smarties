<!DOCTYPE html>
<html>
<head>
  <title>CareSync Login</title>
  <style>
    body { margin:0; font-family:Arial; background:#f8fafc; }
    .app { max-width:520px; min-height:100vh; margin:auto; background:white; padding:24px; }
    .topbar { font-size:24px; font-weight:800; margin-bottom:30px; color:#e0001b; }
    .card { border-radius:22px; box-shadow:0 4px 14px #ddd; overflow:hidden; }
    .header { background:#e0001b; color:white; padding:28px; }
    .body { padding:28px; }
    button { width:100%; border:none; background:#c70019; color:white; padding:18px; border-radius:16px; font-size:18px; font-weight:800; cursor:pointer; }
    p { color:#64748b; line-height:1.5; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">♥ CareSync</div>

    <div class="card">
      <div class="header">
        <h2>🛡 Singpass Login</h2>
        <p style="color:white;">Government Digital Identity</p>
      </div>

      <div class="body">
        <p>Login securely using Singpass to continue to CareSync.</p>
        <button onclick="login()">Login with Singpass</button>
        <p>This is a demo prototype. No real Singpass authentication is used.</p>
      </div>
    </div>
  </div>

  <script>
    function login() {
      localStorage.setItem("isLoggedIn", "true");
      window.location.href = "roles.html";
    }
  </script>
</body>
</html>
